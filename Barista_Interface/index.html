<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mug Exchange — Barista</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #e8e4d4;
      color: #1a1a14;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2d4a1e;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left h1 { font-size: 1.1rem; font-weight: 600; color: #f2efe3; letter-spacing: 0.02em; }
    .header-left p  { font-size: 0.75rem; color: rgba(242,239,227,0.5); margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 10px; }
    .conn-label   { font-size: 0.72rem; color: rgba(242,239,227,0.45); letter-spacing: 0.04em; }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #c0392b;
      transition: background 0.3s;
    }
    #status-dot.connected { background: #27ae60; }

    main { flex: 1; padding: 28px; }

    .queue-header {
      font-size: 0.67rem;
      color: #7a7a60;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    #empty-state {
      text-align: center;
      color: #a0a090;
      margin-top: 100px;
      font-size: 0.95rem;
    }

    #orders-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .order-card {
      background: #f2efe3;
      border: 1.5px solid rgba(61,92,40,0.18);
      border-radius: 14px;
      padding: 22px 24px 18px;
      width: 200px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 10px rgba(45,74,30,0.08);
      transition: opacity 0.35s, transform 0.35s;
    }

    .order-card.removing { opacity: 0; transform: scale(0.88); pointer-events: none; }

    .order-num {
      font-size: 3.4rem;
      font-weight: 700;
      color: #2d4a1e;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .order-divider {
      border: none;
      border-top: 1px solid rgba(61,92,40,0.14);
      margin: 12px 0;
    }

    .order-name  { font-size: 0.88rem; font-weight: 600; color: #1a1a14; }
    .order-drink { font-size: 0.78rem; color: #3a3a2c; margin-top: 3px; }
    .order-cafe  { font-size: 0.7rem;  color: #7a7a60; margin-top: 3px; }
    .order-time  { font-size: 0.68rem; color: #a0a090; margin-top: 6px; }

    .print-btn {
      margin-top: 14px;
      width: 100%;
      padding: 7px 0;
      background: #2d4a1e;
      border: none;
      border-radius: 8px;
      color: #f2efe3;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 160ms;
      letter-spacing: 0.03em;
    }
    .print-btn:hover { background: #3d5c28; }

    /* Hidden print chit */
    #print-area { display: none; }

    @media print {
      body > * { display: none !important; }
      #print-area {
        display: block !important;
        font-family: 'Courier New', monospace;
        width: 58mm;
        padding: 4mm;
        color: #000;
      }
      .chit-brand {
        text-align: center;
        font-size: 11pt;
        font-weight: bold;
        letter-spacing: 0.1em;
        border-bottom: 1px dashed #000;
        padding-bottom: 6pt;
        margin-bottom: 6pt;
      }
      .chit-num {
        text-align: center;
        font-size: 42pt;
        font-weight: bold;
        line-height: 1;
        margin: 4pt 0 2pt;
      }
      .chit-cafe {
        text-align: center;
        font-size: 9pt;
        margin-bottom: 8pt;
        border-bottom: 1px dashed #000;
        padding-bottom: 6pt;
      }
      .chit-row {
        display: flex;
        justify-content: space-between;
        font-size: 9pt;
        margin: 3pt 0;
      }
      .chit-row .label { color: #666; }
      .chit-footer {
        text-align: center;
        font-size: 7pt;
        color: #999;
        border-top: 1px dashed #000;
        padding-top: 6pt;
        margin-top: 8pt;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Mug Exchange</h1>
    <p>Barista display — incoming orders</p>
  </div>
  <div class="header-right">
    <span class="conn-label" id="conn-label">Disconnected</span>
    <div id="status-dot"></div>
  </div>
</header>

<main>
  <div class="queue-header" id="queue-header">Active queue</div>
  <div id="empty-state">No active orders</div>
  <div id="orders-grid"></div>
</main>

<div id="print-area">
  <div class="chit-brand">MUG EXCHANGE</div>
  <div class="chit-num" id="chit-num"></div>
  <div class="chit-cafe" id="chit-cafe"></div>
  <div class="chit-row"><span class="label">Name</span><span id="chit-name"></span></div>
  <div class="chit-row"><span class="label">Drink</span><span id="chit-drink"></span></div>
  <div class="chit-row"><span class="label">Time</span><span id="chit-time"></span></div>
  <div class="chit-footer">reusable mug · return within 3 days</div>
</div>

<script>
  //const SERVER_URL = "http://localhost:3000";
  const SERVER_URL = "https://ec463-diallo-amado.onrender.com";

  const grid        = document.getElementById("orders-grid");
  const emptyMsg    = document.getElementById("empty-state");
  const statusDot   = document.getElementById("status-dot");
  const connLabel   = document.getElementById("conn-label");
  const queueHeader = document.getElementById("queue-header");

  function padNum(n) { return String(n).padStart(2, "0"); }

  function fmtTime(iso) {
    if (!iso) return "—";
    return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  }

  function updateEmpty() {
    const count = grid.children.length;
    emptyMsg.style.display = count === 0 ? "block" : "none";
    queueHeader.textContent = count === 0
      ? "Active queue"
      : `Active queue — ${count} order${count !== 1 ? "s" : ""}`;
  }

  function printChit(order_num, name, item, cafe_name, order_time) {
    document.getElementById("chit-num").textContent   = padNum(order_num);
    document.getElementById("chit-cafe").textContent  = cafe_name || "—";
    document.getElementById("chit-name").textContent  = name || "—";
    document.getElementById("chit-drink").textContent = item || "—";
    document.getElementById("chit-time").textContent  = fmtTime(order_time);
    window.print();
  }

  function addOrderCard(order_num, name, item, cafe_name, order_time) {
    if (document.getElementById(`order-${order_num}`)) return;

    const card = document.createElement("div");
    card.className = "order-card";
    card.id = `order-${order_num}`;

    card.innerHTML = `
      <span class="order-num">${padNum(order_num)}</span>
      <hr class="order-divider">
      <span class="order-name">${name || "—"}</span>
      <span class="order-drink">${item || "—"}</span>
      <span class="order-cafe">${cafe_name || "—"}</span>
      <span class="order-time">${fmtTime(order_time)}</span>
      <button class="print-btn">Print chit</button>
    `;

    card.querySelector(".print-btn").addEventListener("click", () => {
      printChit(order_num, name, item, cafe_name, order_time);
    });

    grid.prepend(card);
    updateEmpty();
  }

  function removeOrderCard(order_num) {
    const card = document.getElementById(`order-${order_num}`);
    if (!card) return;
    card.classList.add("removing");
    setTimeout(() => { card.remove(); updateEmpty(); }, 380);
  }

  fetch(`${SERVER_URL}/barista/active-orders`)
    .then(res => res.json())
    .then(orders => orders.forEach(o => addOrderCard(o.order_num, o.name, o.item, o.cafe_name, o.order_time)))
    .catch(err => console.error("[barista] failed to load active orders:", err));

  const socket = io(SERVER_URL, {
    transports: ["websocket"],
    auth: { token: "barista" },
  });

  socket.on("connect",    () => { statusDot.classList.add("connected");    connLabel.textContent = "Connected";    });
  socket.on("disconnect", () => { statusDot.classList.remove("connected"); connLabel.textContent = "Disconnected"; });

  socket.on("newOrder", ({ order_num, name, item, cafe_name, order_time }) => addOrderCard(order_num, name, item, cafe_name, order_time));
  socket.on("orderPickedUp", ({ order_num }) => removeOrderCard(order_num));

  updateEmpty();
</script>

</body>
</html>
