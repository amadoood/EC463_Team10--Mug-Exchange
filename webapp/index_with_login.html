<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Mug Exchange</title>
    <style>
        /* ==========================================================================
           1. DESIGN TOKENS & VARIABLES
           ========================================================================== */
        :root {
            --bg: #f5f7fb;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --card: #fff;
            --green: #16a34a;
            --green-dark: #166534;
            --green-b: #15803d;
            --red: #ef4444;
            --red-dark: #991b1b;
            --red-bg: #fee2e2;
        }

        /* ==========================================================================
           2. GLOBAL RESET & BASE STYLES
           ========================================================================== */
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        button { font: inherit; cursor: pointer; }
        a { text-decoration: none; color: inherit; }
        :focus-visible { outline: 2px solid #16a34a66; outline-offset: 2px; }

        .app {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .content { padding: 16px 16px 92px; }
        .hidden { display: none !important; }

        .center-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* ==========================================================================
           3. UI ATOMS (Buttons, Inputs, Cards)
           ========================================================================== */
        .h1 { font-weight: 800; font-size: 1.25rem; margin: 8px 0; }
        .h2 { font-weight: 700; font-size: 1.05rem; margin: 0 0 4px; }
        .meta { color: var(--muted); font-size: .9rem; }
        
        .input {
            width: 100%; padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px; font-size: 16px;
            background: #fff;
        }

        .btn {
            padding: 12px 14px; border-radius: 12px;
            border: 1px solid var(--green-b);
            background: var(--green); color: #fff;
            font-weight: 600; display: inline-block; text-align: center;
        }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,.03);
        }

        .row { display: flex; align-items: center; gap: 12px; }
        .stack { display: grid; gap: 12px; }

        /* --- List Items --- */
        .list { display: grid; gap: 12px; }
        .item { display: flex; align-items: center; gap: 12px; }
        .item-body { flex: 1; min-width: 0; }
        .thumb { width: 44px; height: 44px; border-radius: 8px; flex: 0 0 44px; object-fit: contain; }

        /* --- Pills --- */
        .pill {
            white-space: nowrap; font-size: .85rem;
            padding: 6px 10px; border-radius: 999px;
            border: 1px solid var(--green);
            color: var(--green-dark); background: #16a34a1a;
        }
        .overdue-pill { border-color: var(--red); color: var(--red-dark); background: var(--red-bg); }
        .overdue-text { color: var(--red-dark); font-weight: 600; font-size: .9rem; }

        /* ==========================================================================
           4. NAVIGATION & COMPONENTS
           ========================================================================== */
        .nav {
            position: fixed; left: 50%; transform: translateX(-50%);
            bottom: 8px; width: min(420px, 100%);
            background: #fff; border: 1px solid var(--border);
            border-radius: 16px; padding: 8px 10px;
            display: flex; justify-content: space-around; gap: 6px;
            box-shadow: 0 6px 22px rgba(0,0,0,.08);
            z-index: 1000;
        }
        .nav a { padding: 8px 12px; border-radius: 10px; }
        .nav a.active { background: #16a34a1a; color: var(--green-dark); border: 1px solid var(--green); }

        /* --- Map & Pins --- */
        .map {
            height: 260px; border-radius: 12px; border: 1px solid var(--border);
            background: linear-gradient(0deg, var(--border) 1px, transparent 1px) 0 0/36px 36px,
                        linear-gradient(90deg, var(--border) 1px, transparent 1px) 0 0/36px 36px, #c8e3ff;
            position: relative; overflow: hidden;
        }
        .pin {
            position: absolute; width: 18px; height: 18px; border-radius: 50%;
            background: var(--red); border: 2px solid #fff;
            box-shadow: 0 1px 2px rgba(0,0,0,.25); cursor: pointer;
        }
        .pin.green { background: var(--green); }

        /* ==========================================================================
           5. VIEW-SPECIFIC STYLES
           ========================================================================== */
        /* Login */
        .login-hero { display: grid; justify-items: center; gap: 16px; }
        #view-login .logo img { width: 360px; height: auto; margin: 0 auto 16px; display: block; pointer-events: none; }

        /* Dashboard */
        #view-dashboard .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            width: 340px; min-height: 460px;
            padding: 24px 20px 32px;
            display: flex; flex-direction: column; align-items: center; gap: 16px;
        }
        #view-dashboard .h1 { margin: 0; }
        #view-dashboard .logo img { width: 360px; height: auto; margin: 0 auto; display: block; pointer-events: none; }

        /* Dashboard Buttons */
        .btn-grid { margin: 0 auto; max-width: 320px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-grid .full { grid-column: 1 / -1; }

        /* Status Banner */
        .status-banner {
            width: 100%; border: 1px solid var(--border);
            background: #fff; border-radius: 12px;
            padding: 12px 14px; text-align: left;
        }
        .status-banner .title { font-weight: 700; margin-bottom: 4px; }
        .status-none { color: var(--muted); }
        .status-good { color: var(--green-dark); }
        .status-bad { color: var(--red-dark); }
    </style>
</head>
<body>

<div class="app">

    <main id="view-login" class="content center-screen">
        <div class="login-hero">
            <div class="logo">
                <img src="Assets/mug.png" alt="Mug Exchange Logo">
            </div>
            <h1 class="h1">Mug Exchange</h1>
            <div class="stack" style="width:100%; max-width:320px">
                <input id="login-username" class="input" placeholder="Username" autocomplete="off">
                <input id="login-password" class="input" type="password" placeholder="Password">
                
                <button id="login-btn" class="btn">Log In</button>
                
                <button id="btn-goto-signup" style="background:none; border:none; color:var(--green-dark); font-weight:600; margin-top:8px;">
                    Create Account
                </button>
                
                <p id="login-err" class="meta" style="color:#dc2626; display:none">
                    Invalid login. Try <b>demo</b>.
                </p>
            </div>
        </div>
    </main>

    <main id="view-signup" class="content center-screen hidden">
        <div class="login-hero">
            <div class="logo">
                <img src="Assets/mug.png" alt="Mug Exchange Logo">
            </div>
            <h1 class="h1">Join the Exchange</h1>
            <div class="stack" style="width:100%; max-width:320px">
                <input id="signup-username" class="input" placeholder="Username" autocomplete="off">
                <input id="signup-password" class="input" type="password" placeholder="Password">
                <input id="signup-phone" class="input" type="tel" placeholder="Phone Number">
                
                <button id="signup-btn" class="btn">Sign Up</button>
                
                <button id="btn-goto-login" style="background:none; border:none; color:var(--muted); font-weight:600; margin-top:8px;">
                    Back to Login
                </button>
            </div>
        </div>
    </main>

    <main id="view-dashboard" class="content center-screen hidden">
        <div class="card center">
            <h2 class="h1" id="welcome">Welcome Back!</h2>

            <div id="status-container" class="status-banner">
                <div class="title">Mug Status</div>
                <div id="status-text" class="status-none">
                    No active mug. Place an order to get started.
                </div>
            </div>

            <div class="logo">
                <img src="Assets/mug.png" alt="Mug Exchange Logo">
            </div>

            <div class="btn-grid">
                <a class="btn" data-nav="order">Order</a>
                <a class="btn" data-nav="past">Past Orders</a>
                <a class="btn full" data-nav="map">Map</a>
            </div>
        </div>
    </main>

    <main id="view-order" class="content hidden">
        <h1 class="h1">Order from a Partnered Café</h1>
        <input id="order-q" class="input" placeholder="Search by name or location…">
        <div class="meta" id="order-count" style="margin:10px 0 6px">Loading…</div>
        <div id="order-list" class="list"></div>
    </main>

    <main id="view-map" class="content hidden">
        <h1 class="h1">Find a Partnered Cafe</h1>
        <input id="map-q" class="input" placeholder="Search…" style="margin:6px 0 12px 0">
        <div class="map" id="map">
            <div class="pin green" style="left:40px; top:140px" data-id="gsu-starbucks" title="Starbucks @ GSU"></div>
            <div class="pin green" style="left:160px; top:70px" data-id="pavement" title="Pavement Coffeehouse"></div>
            <div class="pin" style="left:260px; top:160px" data-id="bluebottle" title="Blue Bottle — Kenmore"></div>
            <div class="pin green" style="left:100px; top:30px" data-id="cfa" title="CFA Café"></div>
        </div>
        <div id="map-list" class="stack" style="margin-top:12px"></div>
    </main>

        <main id="view-past" class="content hidden">
        <h1 class="h1">Past Orders</h1>
        <div id="past-list" class="list"></div>
    </main>

    <nav class="nav" id="nav" style="display:none">
        <a data-nav="logout">Logout</a>
        <a data-nav="dashboard">Home</a>
        <a data-nav="order">Order</a>
        <a data-nav="map">Map</a>
        <a data-nav="past">History</a>
    </nav>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>

<script>
/* --- constants & data --- */
const IP_ADDRESS = "localhost";
const SOCKET_URL = `http://${IP_ADDRESS}:3000`;
const MUG_SRC = 'Assets/mug.png';

/* --- dom helpers --- */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const byId = id => document.getElementById(id);

/* --- api & socket.io integration --- */
let socket = null;
let orders = []; // Re-introduced but initialized as empty

const state = {
    user: null,
    lastActiveOrderId: null 
};

function setupSocket() {
    console.log("Setting up multi-user socket");
    const token = sessionStorage.getItem("authToken");
    
    try {
        socket = io(SOCKET_URL, {
            transports: ['websocket'],
            auth: { token: token }
        });

        socket.on('orderUpdate', (payload) => {
            // Update the specific order in our local list
            updateOrderInList(payload);
        });

    } catch(e) { console.error('[socket] error:', e); }
}

/* --- State Management --- */

function updateOrderInList(updatedData) {
    const idx = orders.findIndex(o => o.orderId === updatedData.orderId);
    
    if (idx !== -1) {
        // Update existing order
        orders[idx] = { ...orders[idx], ...updatedData };
    } else {
        // New order came in via socket
        orders = [updatedData, ...orders];
    }

    // Refresh whichever view is currently visible
    refreshAllUI();
}

/* --- UI Rendering --- */

function refreshAllUI() {
    renderDashboard();
    renderPastOrders();
}

function renderDashboard() {
    const container = byId('status-container');
    if (!container) return;

    // Filter for active orders (NOT returned)
    const active = orders.filter(o => o.status !== 'MUG_RETURNED');
    
    if (active.length === 0) {
        container.innerHTML = '<div class="status-none">No active mugs. Place an order to start!</div>';
    } else {
        container.innerHTML = active.map(o => {
            // Using the "item" layout to match renderPastOrders exactly
            return `
            <div class="card item">
                <img class="thumb" src="${MUG_SRC}" alt="Mug Icon">
                <div class="item-body">
                    <div class="h2">${o.mug_id} — ${o.merchant_id}</div>
                    <div class="meta">Due: ${o.due || 'TBD'}</div>
                </div>
                <span class="pill">${o.status}</span>
            </div>`;
        }).join('');
    }
}

function renderPastOrders() {
    const container = byId('past-list');
    if (!container) return;

    // Filter for returned orders
    const returned = orders.filter(o => o.status === 'MUG_RETURNED');
    container.innerHTML = returned.map(historyRow).join('') || `<div class="meta">No past orders yet.</div>`;
}

/* --- formatters & logic --- */
function fmtDate(s) {
    if (!s) return 'N/A';
    const d = new Date(s);
    return d.toLocaleString([], { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
}

function historyRow(o) {
    return `
    <div class="card item">
        <img class="thumb" src="${MUG_SRC}" alt="Mug Icon">
        <div class="item-body">
            <div class="h2">${o.mug_id} — ${o.merchant_id}</div>
            <div class="meta">Ordered: //</div>
        </div>
        <span class="pill">Returned</span>
    </div>`;
}


/* --- navigation --- */
function show(view) {
    // If user is attempting to logout, kill socket connection
    if (view === 'logout' && state.user) {
        console.log("User logging out. Cleaning up...");
        
        // 1. Disconnect the socket
        if (socket) {
            socket.disconnect();
            socket = null;
        }
        
        // 2. Clear local state and session
        state.user = null;
        orders = []; 
        sessionStorage.removeItem("authToken");
        
        // 3. Reset the Nav text back to 'Login'
        const loginLink = document.querySelector('.nav a[data-nav="login"]');
        if (loginLink) loginLink.textContent = 'Login';
    }

    // 1. Auth Guard: Redirect to login if user isn't set
    if (view !== 'login' && view !== 'signup' && !state.user) view = 'login';
    
    // 2. View Switching: Hide all, then show the requested view
    ['login', 'signup', 'dashboard', 'order', 'map', 'past'].forEach(v => {
        const el = byId('view-' + v);
        if (el) el.classList.toggle('hidden', v !== view);
    });

    // 3. UI Cleanup: Only show the nav bar if we aren't on the auth screens
    byId('nav').style.display = (view === 'login' || view === 'signup') ? 'none' : 'flex';
    
    // 4. Update Nav active state
    $$('.nav a').forEach(a => a.classList.toggle('active', a.dataset.nav === view));

    // 5. Data Rendering: IMPORTANT 
    // Whenever we switch to the Dashboard or Past orders, 
    // we run refreshAllUI to draw the current state of our 'orders' array.
    if (view === 'dashboard' || view === 'past') {
        refreshAllUI(); 
    }
    
    // If you still have the café search feature
    if (view === 'order') renderOrderList(byId('order-q')?.value || '');
    
    window.scrollTo(0, 0);
}   
    /* --- events --- */
    byId('login-btn').addEventListener('click', async () => {
        const username = byId('login-username').value;
        const password = byId('login-password').value;

        try {
            const res = await fetch(`${SOCKET_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            if (!res.ok) {
                byId('login-err').style.display = 'block';
            } else {
                const data = await res.json();
                
                // 1. Save Token
                sessionStorage.setItem("authToken", data.token);

                // 2. Hydrate Orders from Login Response
                // Expecting server to return: { token: "...", orders: [...] }
                orders = data.orders || [];

                // 3. Set local state
                state.user = username;
                byId('welcome').textContent = `Welcome Back, ${state.user}!`;

                // 4. Initialize UI and Socket
                setupSocket();
                show('dashboard');
                refreshAllUI();
            }
        } catch (err) {
            console.error("Login Error:", err);
        }
    });

    byId('btn-goto-signup').addEventListener('click', () => {
    show('signup');
    });

    byId('signup-btn').addEventListener('click', async () => {
    const user = byId('signup-username').value;
    const pass = byId('signup-password').value;
    const phone = byId('signup-phone').value;

    if(user && pass && phone) {
        try {
            const res = await fetch(`${SOCKET_URL}/signup`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({user, pass, phone})
            });

            if (res.ok) {
                console.log("Signup successful!");
            }
        } catch (err) {
            console.error(err);
        };

        show('login');

    } else {
        alert("Please fill in all fields");
    }
    });

    byId('btn-goto-login').addEventListener('click', () => {
    show('login');
    });

    $$('[data-nav]').forEach(el => el.addEventListener('click', () => show(el.dataset.nav)));
    byId('order-q')?.addEventListener('input', e => renderOrderList(e.target.value));
    
    byId('map-q')?.addEventListener('input', e => {
        const needle = e.target.value.toLowerCase();
        const filtered = cafes.filter(c => (c.name + ' ' + c.area).toLowerCase().includes(needle));
        byId('map-list').innerHTML = filtered.map(cafeRow).join('') || `<div class="meta">No results.</div>`;
    });

    $$('.pin').forEach(pin => {
        pin.addEventListener('click', () => {
            const c = cafes.find(x => x.id === pin.dataset.id);
            if(!c) return;
            byId('map-q').value = c.name;
            byId('map-list').innerHTML = [c].map(cafeRow).join('');
        });
    });

    /* --- manual demo helpers --- */
    window.demoAssign = function(){
        onMugAssigned({
            mugId: 'MUG-' + Math.floor(Math.random()*9000),
            orderId: 'ORDER-' + Math.floor(Math.random()*9000),
            cafe: cafes[0].name, item: 'Latte',
            orderedISO: new Date().toISOString(),
            dueISO: new Date(Date.now() + 3*24*60*60*1000).toISOString()
        });
    };
    window.demoReturn = orderId => onMugReturned(orderId);

    /* --- start --- */
    show('login');
</script>
</body>
</html>
